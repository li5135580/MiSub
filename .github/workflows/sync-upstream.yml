name: Sync upstream

on:
  schedule:
    - cron: "0 4 * * *" # 每天 UTC 04:00 (北京时间 12:00) 运行
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'Commit hash (留空则同步最新提交)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          # 设定上游地址为 imzyb/MiSub
          git remote add upstream https://github.com/imzyb/MiSub.git || true
          git fetch upstream --tags

      - name: Resolve target commit
        id: resolve
        run: |
          TRIGGER="${{ github.event_name }}"
          MANUAL_INPUT="${{ github.event.inputs.target_commit }}"

          if [ "$TRIGGER" = "schedule" ]; then
            # 自动模式：MiSub 通常有 Release，优先同步最新 Release Tag
            LATEST_TAG=$(curl -s https://api.github.com/repos/imzyb/MiSub/releases/latest | jq -r .tag_name)
            
            if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
              echo "上游未发现 Release，直接同步 main 分支。"
              TARGET_SHA=$(git rev-parse upstream/main)
              echo "latest_tag=None" >> $GITHUB_OUTPUT
            else
              TARGET_SHA=$(git rev-list -n 1 "$LATEST_TAG" 2>/dev/null)
              echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
            fi
            echo "mode=auto" >> $GITHUB_OUTPUT
            echo "target_sha=$TARGET_SHA" >> $GITHUB_OUTPUT

          elif [ -n "$MANUAL_INPUT" ]; then
            TARGET_SHA=$(git rev-parse "$MANUAL_INPUT" 2>/dev/null)
            echo "mode=manual" >> $GITHUB_OUTPUT
            echo "target_sha=$TARGET_SHA" >> $GITHUB_OUTPUT
          else
            # 手动模式且空输入，默认拉取上游 main 分支
            TARGET_SHA=$(git rev-parse upstream/main)
            echo "mode=manual" >> $GITHUB_OUTPUT
            echo "target_sha=$TARGET_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Check if update is needed
        id: check
        run: |
          TARGET_SHA="${{ steps.resolve.outputs.target_sha }}"
          if git merge-base --is-ancestor "$TARGET_SHA" HEAD 2>/dev/null; then
            echo "已经是最新版本，跳过。"
            echo "needs_update=false" >> $GITHUB_OUTPUT
          else
            echo "发现新提交，需要更新。"
            echo "needs_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Apply update
        if: steps.check.outputs.needs_update == 'true'
        run: |
          TARGET_SHA="${{ steps.resolve.outputs.target_sha }}"
          MODE="${{ steps.resolve.outputs.mode }}"
          git checkout main
          if [ "$MODE" = "manual" ]; then
            git reset --hard "$TARGET_SHA"
          else
            git merge "$TARGET_SHA" --no-edit
          fi

      - name: Restore workflow file
        if: steps.check.outputs.needs_update == 'true'
        run: |
          # 保护你自己的同步脚本不被上游覆盖
          git checkout HEAD@{1} -- .github/workflows/sync-upstream.yml 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: restore sync-upstream workflow"
          fi

      - name: Push
        if: steps.check.outputs.needs_update == 'true'
        run: |
          if [ "${{ steps.resolve.outputs.mode }}" = "manual" ]; then
            git push origin main --force
          else
            git push origin main
          fi
